server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:blog;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      encoding: utf-8
      schema-locations: classpath:schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-smtp-authorization-code
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=5m,maximumSize=200

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-h2-local-development-only}
  expiration: 86400000

blog:
  site-url: ${BLOG_SITE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${BLOG_CORS_ORIGINS:*}
